        - '<your-broker-id>.mq-beta.ap-southeast-2.on.aws:16003'

  - job_name: 'rabbitmq-channel'
    scheme: https
    basic_auth:
      username: <username>
      password: <password>
    metrics_path: '/metrics/detailed'
    params:
      family: ['channel_metrics']
    static_configs:
      - targets:
        - '<your-broker-id>.mq-beta.ap-southeast-2.on.aws:16001'
