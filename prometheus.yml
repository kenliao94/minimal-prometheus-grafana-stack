        - '<your-broker-id>.mq-beta.ap-southeast-2.on.aws:16001'
        - '<your-broker-id>.mq-beta.ap-southeast-2.on.aws:16002'
        - '<your-broker-id>.mq-beta.ap-southeast-2.on.aws:16003'

  - job_name: 'rabbitmq-queue'
    scheme: https
    basic_auth:
      username: <username>
      password: <password>
    metrics_path: '/metrics/detailed'
    params:
      family: ['queue_metrics']
